name: CI Publish

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

  # Workflow dispatch can only work if this workflow exists in the default branch.
  # Since it does not, we don't use it.
  # workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Fetch upstream tags
        run: |
          git remote add upstream https://github.com/flink-extended/flink-scala-api.git
          git fetch upstream --tags

      - name: Configure SBT
        run: |
          mkdir -p ~/.sbt/1.0

          cat > ~/.sbt/1.0/github.sbt <<-EOF
          credentials += Credentials(
            "GitHub Package Registry",
            "maven.pkg.github.com",
            System.getenv("GITHUB_ACTOR"),
            System.getenv("GITHUB_TOKEN")
          )

          ThisBuild / publishTo := Some(
            "GitHub Packages" at
            "https://maven.pkg.github.com/${{ github.repository }}"
          )
          EOF

      - name: Compute version
        id: version
        run: |
          set -eo pipefail
          base=$(git describe --tags --abbrev=0 | tr -d 'v')
          sha=$(git rev-parse --short HEAD)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "version=${base}-pr${{ github.event.number }}.${sha}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${base}-dev.${sha}" >> "$GITHUB_OUTPUT"
          else
            branch=$(echo "${{ github.ref_name }}" | tr '/' '-')
            echo "version=${base}-${branch}.${sha}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        run: |
          set -eo pipefail
          sbt "set ThisBuild / version := \"${{ steps.version.outputs.version }}\"" publish
